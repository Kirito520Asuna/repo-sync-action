name: 'Repo Sync Action'
description: 'Sync repository from any Git platform to another (GitHub/Gitee/GitLab/GitCode)'
author: 'Kirito520Asuna'

inputs:
  user_email:
    description: 'User email'
    required: false
    default: 'action@github.com'
  user_name:
    description: 'User name'
    required: false
    default: 'GitHub Action'
  src:
    description: 'Source repository URL (e.g., github.com/user/repo.git)'
    required: true
  src_branch:
    description: 'Source branch'
    required: false
    default: 'main'
  src_username:
    description: 'Source repository username'
    required: true
  src_token:
    description: 'Source repository token'
    required: false
  dst:
    description: 'Destination repository URL (e.g., gitee.com/user/repo.git)'
    required: true
  dst_branch:
    description: 'Destination branch'
    required: false
    default: 'master'
  dst_username:
    description: 'Destination repository username'
    required: true
  dst_token:
    description: 'Destination repository token'
    required: false
  force_push:
    description: 'Force push mode (true/false)'
    required: false
    default: 'false'
  git_post_buffer:
    description: 'Git post buffer size in bytes'
    required: false
    default: '524288000'
  git_low_speed_limit:
    description: 'Git low speed limit in bytes/second'
    required: false
    default: '1000'
  git_low_speed_time:
    description: 'Git low speed time in seconds'
    required: false
    default: '60'
  push_timeout:
    description: 'Push timeout in seconds'
    required: false
    default: '3540'
  unrelated_conflict_strategy:
    description: 'Unrelated conflict strategy (MERGE/NEW_PR)'
    required: false
    default: 'MERGE'
  diverged_conflict_strategy:
    description: 'Diverged conflict strategy (MERGE/NEW_PR)'
    required: false
    default: 'MERGE'

  sync_release:
    description: 'Enable Release sync (true/false)' #是否开启 Release 同步（默认 false）
    required: false
    default: 'false'
  release_tag:
    description: 'Specific release tag to sync (empty = sync all new releases)' #指定要同步的标签名（留空则同步全部）
    required: false
    default: ''
  release_limit:
    description: 'Maximum number of releases to sync (latest N releases, sorted by created time)' #全量同步时最多同步多少个 Release（分批防止超时）
    required: false
    default: '50'
  release_hour_threshold:
    description: 'Only sync releases created within the last N hours (0 = no limit)' #只同步最近 N 小时内创建的 Release（与 limit 二选一）
    required: false
    default: '0'

runs:
  using: 'composite'
  steps:
    - name: Configure Git
      shell: bash
      run: |
        git config --global user.email "${{ inputs.user_email || 'action@github.com' }}"
        git config --global user.name "${{ inputs.user_name || 'GitHub Action' }}"

    - name: Sync Repository
      shell: bash
      run: |
        SCRIPT_DIR="${{ github.action_path }}"
        source "$SCRIPT_DIR/bash/shell.sh"
        
        URL_SOURCE="https://${{ inputs.src }}"
        BRANCH_SOURCE="${{ inputs.src_branch }}"
        USERNAME_SOURCE="${{ inputs.src_username }}"
        TOKEN_SOURCE="${{ inputs.src_token }}"
        
        URL_TARGET="https://${{ inputs.dst }}"
        BRANCH_TARGET="${{ inputs.dst_branch }}"
        USERNAME_TARGET="${{ inputs.dst_username }}"
        TOKEN_TARGET="${{ inputs.dst_token }}"

        FORCE_PUSH="${{ inputs.force_push }}"
        GIT_POST_BUFFER="${{ inputs.git_post_buffer }}"
        GIT_LOW_SPEED_LIMIT="${{ inputs.git_low_speed_limit }}"
        GIT_LOW_SPEED_TIME="${{ inputs.git_low_speed_time }}"
        PUSH_TIMEOUT="${{ inputs.push_timeout }}"
        
        DIVERGED_CONFLICT_STRATEGY="${{ inputs.diverged_conflict_strategy }}"
        UNRELATED_CONFLICT_STRATEGY="${{ inputs.unrelated_conflict_strategy }}"
        
        main_sync "$URL_SOURCE" "$BRANCH_SOURCE" "$USERNAME_SOURCE" "$TOKEN_SOURCE" \
                  "$URL_TARGET" "$BRANCH_TARGET" "$USERNAME_TARGET" "$TOKEN_TARGET" \
                  "$FORCE_PUSH" "$GIT_POST_BUFFER" "$GIT_LOW_SPEED_LIMIT" "$GIT_LOW_SPEED_TIME" "$PUSH_TIMEOUT" \
                  "$DIVERGED_CONFLICT_STRATEGY" "$UNRELATED_CONFLICT_STRATEGY"

    - name: Sync Releases
      if: ${{ inputs.sync_release == 'true' }}
      shell: bash
      run: |
        SCRIPT_DIR="${{ github.action_path }}"
        source "$SCRIPT_DIR/bash/shell.sh"
        
        # 复用 main 脚本中的参数环境
        URL_SOURCE="https://${{ inputs.src }}"
        BRANCH_SOURCE="${{ inputs.src_branch }}"
        USERNAME_SOURCE="${{ inputs.src_username }}"
        TOKEN_SOURCE="${{ inputs.src_token }}"
        
        URL_TARGET="https://${{ inputs.dst }}"
        USERNAME_TARGET="${{ inputs.dst_username }}"
        TOKEN_TARGET="${{ inputs.dst_token }}"
        
        RELEASE_TAG="${{ inputs.release_tag }}"
        RELEASE_LIMIT="${{ inputs.release_limit }}"
        RELEASE_HOUR_THRESHOLD="${{ inputs.release_hour_threshold }}"
        
        sync_releases \
          "$URL_SOURCE" "$USERNAME_SOURCE" "$TOKEN_SOURCE" \
          "$URL_TARGET" "$USERNAME_TARGET" "$TOKEN_TARGET" \
          "$RELEASE_TAG" "$RELEASE_LIMIT" "$RELEASE_HOUR_THRESHOLD"

branding:
  icon: 'refresh-cw'
  color: 'blue'
